apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-upjet-github
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-upjet-github:v0.19.0
---
apiVersion: github.m.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: github
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: github-provider-creds
      key: credentials
